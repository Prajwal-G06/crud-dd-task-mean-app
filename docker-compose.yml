version: "3.9"

services:
  mongodb:
    image: mongo:6-jammy
    container_name: mean-mongodb
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  backend:
    image: prajwalg06/mean-backend:latest
    container_name: mean-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/mean-db
    depends_on:
      - mongodb
    ports:
      - "8080:8080"

  frontend:
    image: prajwalg06/mean-frontend:latest
    container_name: mean-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mongo-data: