name: MEAN App CI/CD

on:
  push:
    branches:
      - master

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mean-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mean-frontend

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ Docker login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ================= BACKEND =================

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
            context: ./backend
            push: true
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/mean-backend:latest}

      # ================= FRONTEND =================

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
            context: ./frontend
            push: true
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/mean-frontend:latest

      # ================= DEPLOY =================

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment..."
            cd ~/assis/crud-dd-task-mean-app

            echo "Pulling latest images..."
            docker-compose pull

            docker-compose down

            echo "Restarting containers..."
            docker-compose up -d --remove-orphans

            echo "Cleanup old images..."
            docker image prune -f
            echo "✅ Deployment completed"