name: MEAN App CI/CD

on:
  push:
    branches:
      - master

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mean-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mean-frontend

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ Docker login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ================= BACKEND =================

      - name: Build backend image
        run: |
          docker build -t $BACKEND_IMAGE:latest ./backend
          docker tag $BACKEND_IMAGE:latest $BACKEND_IMAGE:${{ github.sha }}

      - name: Push backend image
        run: |
          docker push $BACKEND_IMAGE:latest
          docker push $BACKEND_IMAGE:${{ github.sha }}

      # ================= FRONTEND =================

      - name: Build frontend image
        run: |
          docker build -t $FRONTEND_IMAGE:latest ./frontend
          docker tag $FRONTEND_IMAGE:latest $FRONTEND_IMAGE:${{ github.sha }}

      - name: Push frontend image
        run: |
          docker push $FRONTEND_IMAGE:latest
          docker push $FRONTEND_IMAGE:${{ github.sha }}

      # ================= DEPLOY =================

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment..."
            cd ~/assis/crud-dd-task-mean-app

            echo "Pulling latest images..."
            docker-compose pull

            echo "Restarting containers..."
            docker-compose up -d --remove-orphans

            echo "Cleanup old images..."
            docker image prune -f
            echo "✅ Deployment completed"